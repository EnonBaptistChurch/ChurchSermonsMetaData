name: Build and Release MSI

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ----------------------------
      # Setup .NET 10
      # ----------------------------
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      # ----------------------------
      # Restore solution (.slnx supported via dotnet)
      # ----------------------------
      - name: Restore
        run: dotnet restore ChurchSermonsMetaData.sln

      # ----------------------------
      # Build main app
      # ----------------------------
      - name: Build Setup Project Only
        shell: cmd
        run: |
          "%DEVENV%" ChurchSermonsMetaData.sln /Build "Release|Any CPU" /Project "ChurchSermonsMetaData.Installer"

      - name: Verify MSI output
        shell: pwsh
        run: |
          Get-ChildItem -Recurse -Filter *.msi

      # ----------------------------
      # Locate Visual Studio (IMPORTANT FIX)
      # ----------------------------
      - name: Locate Visual Studio
        shell: pwsh
        run: |
          $devenv = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" `
            -latest `
            -products * `
            -requires Microsoft.Component.MSBuild `
            -find Common7\IDE\devenv.com

          if (-not $devenv) {
            throw "devenv.com not found"
          }

          echo "DEVENV=$devenv" >> $env:GITHUB_ENV

      # ----------------------------
      # Build MSI (.vdproj)
      # ----------------------------
      - name: Build MSI (Setup Project)
        shell: cmd
        run: |
          "%DEVENV%" ChurchSermonsMetaData.sln /Build "Release|Any CPU"

      # ----------------------------
      # Find MSI output
      # ----------------------------
      - name: Locate MSI
        shell: pwsh
        run: |
          Get-ChildItem -Path . -Recurse -Filter *.msi

      # ----------------------------
      # Upload artifact
      # ----------------------------
      - name: Upload MSI Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChurchSermonsMetaData-MSI
          path: "**/*.msi"

      # ----------------------------
      # Create GitHub Release (only on tags)
      # ----------------------------
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: "**/*.msi"