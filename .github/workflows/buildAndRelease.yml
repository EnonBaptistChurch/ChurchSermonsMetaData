name: Build and Release MSI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore ChurchSermonsMetaData.slnx

      - name: Build Solution
        shell: cmd
        run: |
          "%ProgramFiles%\Microsoft Visual Studio\2022\Enterprise\Common7\IDE\devenv.com" ChurchSermonsMetaData.sln /Build Release

      - name: Find MSI
        shell: pwsh
        run: |
          Get-ChildItem -Path . -Recurse -Filter *.msi

      - name: Upload MSI Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChurchSermonsMetaData-MSI
          path: '**/*.msi'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: '**/*.msi'