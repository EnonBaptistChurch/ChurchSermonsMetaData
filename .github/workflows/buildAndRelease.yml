# .github/workflows/build-installer.yml
name: Build ChurchSermonsMetaData Installer

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Install WiX v3 Toolset
        run: choco install wixtoolset -y
        shell: pwsh

      - name: Publish ChurchSermonsMetaData
        run: |
          dotnet publish ChurchSermonsMetaData/ChurchSermonsMetaData.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            --output ChurchSermonsMetaData/bin/Release/net10.0-windows/win-x64/publish
        shell: pwsh

      - name: Build MSI
        run: |
          $env:PATH = "C:\Program Files (x86)\WiX Toolset v3.11\bin;$env:PATH"
          msbuild ChurchSermonsMetaData.Installer/ChurchSermonsMetaData.Installer.wixproj `
            /p:Configuration=Release
        shell: pwsh

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: ChurchSermonsMetaData-installer
          path: '**/*.msi'
          if-no-files-found: error