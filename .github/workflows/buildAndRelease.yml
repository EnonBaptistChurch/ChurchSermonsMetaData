# .github/workflows/build-installer.yml
name: Build ChurchSermonsMetaData Installer

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Install WiX v4 CLI
        run: dotnet tool install --global wix

      - name: Add WiX extension
        run: wix extension add WixToolset.UI.wixext/4.0.5

      - name: Publish ChurchSermonsMetaData
        run: |
          dotnet publish ChurchSermonsMetaData/ChurchSermonsMetaData.csproj \
            --configuration Release \
            --runtime win-x64 \
            --self-contained true \
            --output ChurchSermonsMetaData/bin/Release/net10.0-windows/win-x64/publish

      - name: Harvest publish files
        run: |
          wix harvest dir \
            ChurchSermonsMetaData/bin/Release/net10.0-windows/win-x64/publish \
            -cg AppFiles \
            -dr INSTALLFOLDER \
            -out ChurchSermonsMetaData.Installer/AppFiles.wxs

      - name: Build MSI
        run: |
          dotnet build ChurchSermonsMetaData.Installer/ChurchSermonsMetaData.Installer.wixproj \
            --configuration Release

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChurchSermonsMetaData-installer
          path: 'ChurchSermonsMetaData.Installer/bin/Release/*.msi'
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        with:
          tag_name: release-${{ github.run_number }}
          name: ChurchSermonsMetaData build ${{ github.run_number }}
          body: Automated release from commit ${{ github.sha }}
          files: 'ChurchSermonsMetaData.Installer/bin/Release/*.msi'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}