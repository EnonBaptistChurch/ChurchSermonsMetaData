# .github/workflows/build-installer.yml
name: Build ChurchSermonsMetaData Installer

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Install WiX v3 Toolset
        run: choco install wixtoolset -y
        shell: pwsh

      - name: Publish ChurchSermonsMetaData
        run: |
          dotnet publish ChurchSermonsMetaData/ChurchSermonsMetaData.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            --output ChurchSermonsMetaData/bin/Release/net10.0-windows/win-x64/publish
        shell: pwsh

      - name: Build MSI
        run: |
          $wixTargets = Get-ChildItem "C:\Program Files (x86)" -Recurse -Filter "WiX.targets" -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
          if (-not $wixTargets) {
            $wixTargets = Get-ChildItem "C:\" -Recurse -Filter "WiX.targets" -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
          }
          Write-Host "Found WiX.targets at: $wixTargets"
          msbuild ChurchSermonsMetaData.Installer/ChurchSermonsMetaData.Installer.wixproj `
            /p:Configuration=Release `
            /p:Platform=x86 `
            /p:WixTargetsPath="$wixTargets"
        shell: pwsh

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChurchSermonsMetaData-installer
          path: 'ChurchSermonsMetaData.Installer/bin/Release/*.msi'
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        with:
          tag_name: release-${{ github.run_number }}
          name: ChurchSermonsMetaData build ${{ github.run_number }}
          body: |
            Automated release from commit ${{ github.sha }}
          files: 'ChurchSermonsMetaData.Installer/bin/Release/*.msi'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}