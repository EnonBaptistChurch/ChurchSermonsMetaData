name: Build and Release App

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    env:
      Solution_Name: ChurchSermonsMetaData.sln                      
      Main_Project_Path: ChurchSermonsMetaData/ChurchSermonsMetaData.csproj 

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # Install the .NET Core SDK
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    # Restore dependencies
    - name: Restore Dependencies
      run: dotnet restore ${{ env.Solution_Name }}

    # Build and Publish the main app into a target folder
    - name: Publish Application
      run: |
        dotnet publish ${{ env.Main_Project_Path }} `
          --configuration Release `
          --output ./publish_output `
          --runtime win-x64 `
          --self-contained false

    # Zip up the published output directory (Optional alternative download)
    - name: Archive Production Artifacts
      shell: powershell
      run: |
        Compress-Archive -Path ./publish_output/* -DestinationPath ./ChurchSermonsMetaData-Windows.zip

    # --- INNO SETUP STEPS ---
    
    # 1. Install Inno Setup compiler tool via Chocolatey
    - name: Install Inno Setup
      run: choco install innosetup -y

    # 2. Run Inno Setup compiler on your script to generate the .exe installer
    - name: Compile Installer
      run: iscc installer.iss

    # ------------------------

    # Automatically create a GitHub Release and attach BOTH the Zip and the Installer Exe
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: Release v1.0.${{ github.run_number }}
        body: |
          Automated build release for ChurchSermonsMetaData.
          
          ### 🚀 Installation Options:
          1. **Recommended:** Download and run `ChurchSermonsMetaData-Setup.exe` to install the app via the wizard.
          2. **Portable:** Download and extract `ChurchSermonsMetaData-Windows.zip`.
          
          *Note: Requires the .NET 8 Runtime installed on your PC.*
        draft: false
        prerelease: false
        files: |
          ChurchSermonsMetaData-Windows.zip
          ChurchSermonsMetaData-Setup.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}